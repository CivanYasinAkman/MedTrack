<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MedTrack – Medicine Tracker</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header>
    <h1>💊 MedTrack</h1>
    <p class="subtitle">Medicine Reminder & Pill Tracker</p>
    <div id="userInfo" class="hidden">
    <span id="usernameDisplay"></span>
    <button id="logoutBtn">Çıkış Yap</button>
  </div>
  </header>

  <div id="reminderAlert" class="reminder-alert hidden"></div>

<!-- Login / Register ekranı -->
<div id="authSection">
  <div class="auth-box">
    <h2 id="authTitle">Giriş Yap</h2>

    <label>Kullanıcı Adı
      <input type="text" id="authUsername" placeholder="Kullanıcı adı" />
    </label>
    <label>Şifre
      <input type="password" id="authPassword" placeholder="Şifre" />
    </label>

    <div id="authError" class="error-box hidden"></div>

    <div class="form-buttons">
      <button id="loginBtn">Giriş Yap</button>
      <button id="switchAuthBtn">Kayıt Ol</button>
    </div>
  </div>
</div>

  <main class="hidden">
    <div class="toolbar">
      <input type="text" id="searchInput" placeholder="Search medicines..." />
      <button id="showFormBtn" class="btn-primary">+ Add Medicine</button>
    </div>

    <div id="formSection" class="hidden">
      <div class="form-container">
        <h2 id="formTitle">Add New Medicine</h2>
        <form id="medicineForm">
          <input type="hidden" id="medicineId" />

          <div class="input-group">
            <label for="medicineName">Medicine Name *</label>
            <input type="text" id="medicineName" placeholder="e.g. Paracetamol" required />
          </div>

          <div class="input-group">
            <label for="dosage">Dosage *</label>
            <input type="text" id="dosage" placeholder="e.g. 500mg" required />
          </div>

          <div class="input-group">
            <label for="stockAmount">Stock Amount *</label>
            <input type="number" id="stockAmount" placeholder="e.g. 30" min="0" required />
          </div>

          <div class="input-group">
            <label for="expirationDate">Expiration Date *</label>
            <input type="date" id="expirationDate" required />
          </div>

          <div class="input-group">
            <label for="categoryId">Category</label>
            <select id="categoryId">
              <option value="">-- Select Category --</option>
            </select>
          </div>

          <div class="input-group">
            <label for="frequency">Frequency</label>
            <select id="frequency">
              <option value="">-- Seçiniz --</option>
              <option value="Günde 1 kez">Günde 1 kez</option>
              <option value="Günde 2 kez">Günde 2 kez</option>
              <option value="Günde 3 kez">Günde 3 kez</option>
            </select>
          </div>

          <div id="reminderTimesContainer" class="reminder-times-box"></div>

          <div id="formErrors" class="error-box hidden"></div>

          <div class="form-buttons">
            <button type="submit" id="submitBtn" class="btn-save">Save</button>
            <button type="button" id="cancelBtn" class="btn-cancel">Cancel</button>
          </div>
        </form>
      </div>
    </div>

    <div id="medicineList">
      <p id="loadingMsg">Loading medicines...</p>
    </div>
  </main>

  <div id="logModal" class="modal hidden">
    <div class="modal-content">
      <h3 id="modalTitle">Dose History</h3>
      <ul id="logList"></ul>
      <button id="closeModal" class="btn-close">Close</button>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
